<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Library Category Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 40px 0; background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-md-12 text-center mb-4">
            <h2>📚 E-Library Category Management</h2>
            <hr>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0" id="formTitle">Add New Category</h5>
                </div>
                <div class="card-body">
                    <form id="categoryForm">
                        <input type="hidden" id="categoryId">
                        
                        <div class="mb-3">
                            <label for="categoryName" class="form-label">Category Name</label>
                            <input type="text" class="form-control" id="categoryName" placeholder="e.g., Science Fiction" required>
                        </div>

                        <div class="mb-3">
                            <label for="categoryDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="categoryDescription" rows="3" placeholder="e.g., Books detailing futuristic technology..." required></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100" id="submitBtn">Save Category</button>
                        <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="cancelBtn" onclick="resetForm()">Cancel Edit</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Existing Categories</h5>
                    <button class="btn btn-sm btn-light" onclick="fetchCategories()">🔄 Refresh</button>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover table-striped mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 10%">ID</th>
                                <th style="width: 25%">Category Name</th>
                                <th>Description</th>
                                <th style="width: 20%" class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="categoryTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Update this URL if your Controller route prefix differs (e.g., https://localhost:7297/api/categories)
    const API_URL = "https://localhost:7297/api/Categories"; 

    // DOM Elements
    const form = document.getElementById('categoryForm');
    const categoryIdInput = document.getElementById('categoryId');
    const categoryNameInput = document.getElementById('categoryName');
    const categoryDescInput = document.getElementById('categoryDescription');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const tableBody = document.getElementById('categoryTableBody');

    // Automatically load categories on page start
    document.addEventListener("DOMContentLoaded", fetchCategories);

    // READ: Get All Categories
    async function fetchCategories() {
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error("Failed to load categories.");
            const categories = await response.json();
            
            tableBody.innerHTML = "";
            if (categories.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No categories found.</td></tr>`;
                return;
            }

            categories.forEach(cat => {
                // Safeguard against alternate JSON capitalization configurations
                const id = cat.id ?? cat.Id;
                const name = cat.name ?? cat.Name;
                const description = cat.description ?? cat.Description ?? "";

                // Escape quotes safely inside inline JS function calls
                const safeDesc = description.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                const row = `
                    <tr>
                        <td>${id}</td>
                        <td><strong>${name}</strong></td>
                        <td><small class="text-muted">${description}</small></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-warning me-1" onclick="editCategory(${id}, '${name}', '${safeDesc}')">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteCategory(${id})">Delete</button>
                        </td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
        } catch (error) {
            console.error("Fetch Error:", error);
            tableBody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Error connecting to the API. Check Console log and verify CORS configuration.</td></tr>`;
        }
    }

    // CREATE & UPDATE: Submit Handlers
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const id = categoryIdInput.value;
        const name = categoryNameInput.value;
        const description = categoryDescInput.value;
        
        // Form payload mapping matching the exact CategoryDto object signature
        const dto = { 
            name: name,
            description: description
        };
        
        if (id) dto.id = parseInt(id); 

        const isUpdate = !!id;
        const method = isUpdate ? 'PUT' : 'POST';

        try {
            const response = await fetch(API_URL, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dto)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Server responded with status ${response.status}: ${errorText || response.statusText}`);
            }
            
            resetForm();
            fetchCategories();
        } catch (error) {
            console.error("Submission Failure:", error);
            alert(`Execution failed!\n${error.message}`);
        }
    });

    // Populate values into form to toggle Edit State
    function editCategory(id, name, description) {
        categoryIdInput.value = id;
        categoryNameInput.value = name;
        categoryDescInput.value = description;
        formTitle.innerText = "Edit Category";
        submitBtn.innerText = "Update Category";
        submitBtn.className = "btn btn-warning w-100";
        cancelBtn.classList.remove('d-none');
    }

    // DELETE: Removes object record
    async function deleteCategory(id) {
        if (!confirm("Are you sure you want to delete this category?")) return;

        try {
            const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Deletion status returned error code: ${response.status}. ${errorText}`);
            }
            fetchCategories();
        } catch (error) {
            console.error("Delete Error:", error);
            alert(error.message);
        }
    }

    // Reset components to base state
    function resetForm() {
        form.reset();
        categoryIdInput.value = "";
        formTitle.innerText = "Add New Category";
        submitBtn.innerText = "Save Category";
        submitBtn.className = "btn btn-success w-100";
        cancelBtn.classList.add('d-none');
    }
</script>

</body>
</html>
